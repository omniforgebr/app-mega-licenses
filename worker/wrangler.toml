name = "app-mega-license-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "LICENSES"
id = "REPLACE_WITH_KV_ID"          # output of: wrangler kv namespace create LICENSES

[triggers]
crons = ["0 */4 * * *"]            # every 4h

[vars]
GITHUB_REPO = "omniforgebr/app-mega-licenses"
KID = "of-license-2026"
SEAT_PUBLIC_KEY = "REPLACE_WITH_PUBLIC_KEY"   # raw base64 (par da SIGNING_KEY) — saida do keygen
